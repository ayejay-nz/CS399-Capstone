services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - frontend_next_cache:/app/.next
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

volumes:
  frontend_node_modules:
  frontend_next_cache:
